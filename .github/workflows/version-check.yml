name: Version Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-version-bump:
    name: Require version bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Compare versions
        run: |
          python3 - <<'EOF'
          import re, sys
          from functools import reduce

          def get_version(path):
              text = open(path).read()
              m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.MULTILINE)
              if not m:
                  print(f"ERROR: Could not parse version from {path}", file=sys.stderr)
                  sys.exit(1)
              return tuple(int(x) for x in m.groups())

          pr_ver   = get_version("pr/pyproject.toml")
          main_ver = get_version("main/pyproject.toml")

          print(f"main version : {'.'.join(str(x) for x in main_ver)}")
          print(f"PR   version : {'.'.join(str(x) for x in pr_ver)}")

          if pr_ver <= main_ver:
              print(
                  f"\n❌ Version must be bumped before merging to main.\n"
                  f"   Current main: {'.'.join(str(x) for x in main_ver)}  →  PR version must be higher.\n"
                  f"   Run:  python scripts/bump_version.py --patch  (or --minor / --major)",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"\n✅ Version bumped ({'.'.join(str(x) for x in main_ver)} → {'.'.join(str(x) for x in pr_ver)}). Good to merge.")
          EOF
